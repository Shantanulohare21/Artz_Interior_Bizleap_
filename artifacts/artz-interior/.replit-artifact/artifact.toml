kind = "web"
previewPath = "/"
title = "Artz Interior — Nagpur Interior Design Studio"
version = "1.0.0"
id = "artifacts/artz-interior"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20174

[services.development]
run = "pnpm --filter @workspace/artz-interior run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/artz-interior", "run", "build" ]
publicDir = "artifacts/artz-interior/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20174"
BASE_PATH = "/"
